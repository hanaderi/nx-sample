version: '3.9'

# Build-Outside strategy: run `nx run-many -t docker-build` to build all images
# before starting services. The Dockerfiles copy pre-built dist/ artifacts —
# they do not compile code themselves.
#
# Port map:
#   web       → http://localhost:8080
#   api       → http://localhost:3000
#   admin-api → http://localhost:3001

services:
  web:
    image: nx-sample-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '8080:80'
    depends_on:
      - api
      - admin-api
    restart: unless-stopped

  api:
    image: nx-sample-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  admin-api:
    image: nx-sample-admin-api:latest
    build:
      context: .
      dockerfile: apps/admin-api/Dockerfile
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
    restart: unless-stopped
